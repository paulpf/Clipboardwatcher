name: Build Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version (e.g. 0.1.2). Leave empty to use tag/default."
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Resolve version
        id: version
        shell: powershell
        run: |
          $manual = "${{ github.event.inputs.version }}"
          if (-not [string]::IsNullOrWhiteSpace($manual)) {
            $version = $manual.Trim()
          }
          elseif ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.ref_name }}".Trim()
            if ($tag.StartsWith("v")) {
              $tag = $tag.Substring(1)
            }
            $version = $tag
          }
          else {
            $version = "0.1.2"
          }

          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build installer
        shell: powershell
        run: .\setup\Build-Installer.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardWatcher-Setup-${{ steps.version.outputs.value }}
          path: artifacts\installer\ClipboardWatcher-Setup-${{ steps.version.outputs.value }}.exe
          if-no-files-found: error

      - name: Attach installer to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts\installer\ClipboardWatcher-Setup-${{ steps.version.outputs.value }}.exe
